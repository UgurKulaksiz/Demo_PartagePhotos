<div class="face-snap-card">
    <h2>{{ faceSnapModel.title }}</h2>
    <img [src]="faceSnapModel.imageUrl" [alt]="faceSnapModel.title">
    <p>{{ faceSnapModel.description }}</p>
    <p>FaceSnap créée le {{ faceSnapModel.createdAt }}</p>
    <p>
        <button (click)="onSnap()">{{ snapButtonText }}</button>
        🤌 {{ faceSnapModel.snaps }}
    </p>
</div>
